<div class="enrollment-container">
  <h2>Student Enrollment Request</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <!-- Student Name -->
    <div class="form-group">
      <label>Student Name</label>
      <input type="text" formControlName="studentName" />
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']">
        Name is required.
      </span>
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']">
        Name must be at least 3 characters.
      </span>
    </div>

    <!-- Student Email -->
    <div class="form-group">
      <label>Student Email</label>
      <input type="email" formControlName="studentEmail" />
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']">
        Email is required.
      </span>
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']">
        Enter a valid email.
      </span>
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['emailTaken']">
        Email is already taken.
      </span>
    </div>

    <!-- Course ID -->
    <div class="form-group">
      <label>Course ID</label>
      <input type="text" formControlName="courseId" />
      <span *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']">
        Course ID is required.
      </span>
      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
        Course code starting with XX is not allowed.
      </span>
    </div>

    <!-- Preferred Semester -->
    <div class="form-group">
      <label>Preferred Semester</label>
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <!-- Agree to Terms -->
    <div class="form-group">
      <label>
        <input type="checkbox" formControlName="agreeToTerms" />
        I agree to the terms and conditions
      </label>
    </div>

    <!-- Additional Courses -->
    <div class="form-group">
      <label>Additional Courses</label>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index">
        <input type="text" [formControl]="$any(ctrl)" placeholder="Enter course code" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
      <button type="button" (click)="addCourse()">Add Another Course</button>
    </div>

    <!-- Submit Button -->
    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>

  </form>
</div>
