<div class="course-list">
  <h2>Available Courses</h2>

  <!-- Search with query param -->
  <div>
    <input 
      [(ngModel)]="searchTerm" 
      placeholder="Search courses..." 
      (input)="onSearch()" />
  </div>

  <div *ngIf="isLoading">
    <p>Loading courses...</p>
  </div>

  <div *ngIf="!isLoading">
    <div *ngIf="courses.length > 0; else noCourses">
      <app-course-card
        *ngFor="let course of courses; let i = index; trackBy: trackByCourseId"
        [course]="course"
        (enrollRequested)="onEnroll($event)"
        (click)="onCardClick(course.id)"
        style="cursor: pointer;">
      </app-course-card>
    </div>

    <ng-template #noCourses>
      <p>No courses available.</p>
    </ng-template>
  </div>

  <p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
</div>
